name: CI/CD Pipeline

on:
  push:
    branches:
      - developer
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # Checkout the repository code
    - name: Checkout Code
      uses: actions/checkout@v3

    # Set up Docker environment
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

      # Install Docker Compose
    - name: Install Docker Compose
      run: |
        sudo apt-get update
        sudo apt-get install docker-compose-plugin

    # Log in to Docker Hub (opcional, se estiver usando um repositório privado ou quiser fazer push das imagens)
    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # Build and run Docker Compose
    - name: Build and Run Docker Compose
      run: |
        docker-compose -f docker-compose.yml up --build -d
      # env:
      #   # Caso precise de variáveis de ambiente
      #   DATABASE_URL: ${{ secrets.DATABASE_URL }}
    
    # (Opcional) Test if services are running properly, e.g., using curl to check app health
    # - name: Check Web App Status
    #   run: curl --fail http://localhost:8080 || exit 1

    # # (Opcional) Run tests inside containers (se você tiver testes automatizados configurados)
